services: 
  db:
    image: postgres: 16
    container_name: apparel-postgres
    environment: 
      POSTGRES_DB: apparel_db
      POSTGRES_USER: apparel_user
      POSTGRES_PASSWORD: apparel_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apparel-user -d apparel_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: apparel-backend
    environment:
      DATABASE_URL: postgres+psycopg2://apparel_user:apparel_password@db:5432/apparel_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  volumes:
    postgres_data: